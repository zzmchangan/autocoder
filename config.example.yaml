# AutoCoder 配置文件
# 复制为 config.yaml 并填入你的配置

supervisor:
  api_key: ${GLM_API_KEY}           # 建议用环境变量，或直接填 key
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  model: "glm-5.1"

worker:
  model: "glm-5.1"
  host: "127.0.0.1"
  port: 4096
  timeout: 600
  command: "opencode"

verifier:
  build_cmd: null
  test_cmd: null

general:
  max_retries: 3
  stop_on_failure: false
  project_path: "."
